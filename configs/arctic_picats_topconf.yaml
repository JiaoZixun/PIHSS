processed_dir: ./outputs/picats_arctic/sequences
train_list: ./outputs/picats_arctic/splits/train.txt
val_list: ./outputs/picats_arctic/splits/val.txt
out_dir: ./outputs/picats_arctic/exp_topconf

window: 24
stride: 4
batch_size: 16
num_workers: 4
epochs: 120
lr: 0.0002
min_lr: 0.00001
weight_decay: 0.00005
grad_clip_norm: 1.0
use_amp: true
seed: 2026

contact_thresh_m: 0.015
dt: 0.0333333333

model:
  hidden_dim: 384
  endpoint_token_dim: 128
  object_token_dim: 128
  num_object_tokens: 384
  num_contact_blocks: 3
  temporal_layers: 5
  temporal_heads: 8
  temporal_ffn_mult: 4
  dropout: 0.10
  use_contact_prior: true

schedule:
  supervised_warmup_epochs: 5
  physics_warmup_epochs: 20
  max_physics_scale: 1.0

loss_weights:
  obj_trans: 120.0
  obj_rot: 18.0
  obj_arti: 2.0
  contact_bce: 2.0
  contact_focal: 1.0
  contact_dice: 0.5
  endpoint_contact_dist: 1.0
  no_contact_static: 8.0
  contact_velocity: 4.0
  contact_motion_align: 2.0
  impulse_dyn: 0.35
  angular_dyn: 0.15
  friction_cone: 0.25
  non_contact_force: 0.20
  force_smooth: 0.10
  delta_smooth: 0.20
