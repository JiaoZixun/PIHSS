processed_dir: ./outputs/picats_arctic/sequences
train_list: ./outputs/picats_arctic/splits/train.txt
val_list: ./outputs/picats_arctic/splits/val.txt
out_dir: ./outputs/picats_arctic/stage3_teacher_vae_impl_rewrite/supervised_overfit
window: 16
stride: 2
batch_size: 2
num_workers: 0
epochs: 60
lr: 0.0002
min_lr: 1.0e-05
weight_decay: 5.0e-05
grad_clip_norm: 1.0
use_amp: false
seed: 2026
contact_thresh_m: 0.015
dt: 0.0333333333
model:
  hidden_dim: 384
  endpoint_token_dim: 128
  object_token_dim: 128
  num_object_tokens: 384
  num_contact_blocks: 3
  temporal_layers: 5
  temporal_heads: 8
  temporal_ffn_mult: 4
  dropout: 0.1
  use_contact_prior: true
stage: supervised_overfit
physics_scale: 0.0
physics_scale_schedule:
  type: linear
  start: 0.0
  end: 0.0
  epochs: 1
overfit:
  enabled: true
  num_batches: 4
  same_val: true
  fixed_indices_seed: 2026
  shuffle: false
early_stop:
  metric: val_overfit_same/balanced_score
  mode: min
loss_weights:
  obj_trans: 1.0
  obj_rot: 0.5
  obj_arti: 0.5
  contact_bce: 0.5
  contact_focal: 0.5
  contact_dice: 0.5
  endpoint_contact_dist: 1.0
  no_contact_static: 0.1
  contact_velocity: 0.1
  contact_motion_align: 0.1
  impulse_dyn: 0.01
  angular_dyn: 0.0005
  friction_cone: 0.005
  non_contact_force: 0.005
  delta_smooth: 0.05
  force_smooth: 0.001
